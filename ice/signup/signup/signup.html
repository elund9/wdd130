<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        #formContainer {
            width: 600px;
            background: white;
            border: 10px solid #0d2c7d;
            border-radius: 40px;
            overflow: hidden;
            text-align: center;
        }

        .image-container {
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .Title {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-shadow: 2px 2px 6px black;
        }

        .Title h1 {
            font-size: 40px;
            margin: 0;
        }

        .Title h2 {
            font-size: 28px;
            margin: 0;
        }

        form {
            padding: 20px 60px;
            display: grid;
            grid-template-columns: 140px 1fr;
            row-gap: 15px;
            align-items: center;
        }

        form label {
            text-align: right;
            padding-right: 10px;
        }

        form input[type="text"],
        form input[type="password"],
        form input[type="email"] {
            width: 100%;
            height: 25px;
        }

        form div {
            grid-column: 2;
        }

        form section {
            grid-column: 1 / span 2;
            text-align: center;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        #formContainer {
            position: relative;
        }

        #output {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        #output img {
            width: 110px;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div class="image-container">
            <img src="images/jesus_feeds_5000.jpeg" alt="jesus_feeds">
            <div class="Title">
                <h1>Daily Feed</h1>
                <h2>Scripture a day</h2>
            </div>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="output">
            <div class="Old Testament">
                <img src="images/old_testament.webp" alt="old_testament">
            </div>
            <div class="New Testament">
                <img src="images/new_testament.webp" alt="new_testament">
            </div>
            <div class="Book of Mormon">
                <img src="images/book_of_mormon.webp" alt="book_of_mormon">
            </div>
            <div class="Doctrine and Covenants">
                <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants">
            </div>
            <div class="Pearl of Great Price">
                <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
            </div>
        </div>
    </div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
        });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
        });
    </script>

</body>

</html>
